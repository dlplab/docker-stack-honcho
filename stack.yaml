# Honcho self-hosted stack for Docker Compose / Portainer
# External PostgreSQL mode — no local database service.
# Upstream: https://github.com/plastic-labs/honcho
# Honcho server version pinned to v3.0.7, current stable observed 2026-05-29.
#
# Required in .env:
#   FQDN_HONCHO=honcho.example.com
#   DB_CONNECTION_URI=postgresql+psycopg://honcho:<password>@<postgres-host>:5432/app-dlplab-honcho
#   REDIS_PASSWORD=<strong local redis password>
#   LLM_OPENAI_API_KEY=<key>   # or equivalent configured provider
#
# Deploy:
#   cd /home/gdelapierre/honcho
#   docker compose --env-file .env -f stack.yaml up -d
#
# Hermes Honcho baseUrl after deploy:
#   https://${FQDN_HONCHO}

services:
  honcho-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.7
    container_name: honcho-api
    restart: unless-stopped
    entrypoint: ["sh", "docker/entrypoint.sh"]
    environment:
      FQDN_HONCHO: ${FQDN_HONCHO}
      HONCHO_BIND_IP: ${HONCHO_BIND_IP:-127.0.0.1}
      HONCHO_PORT: ${HONCHO_PORT:-8000}
      DB_CONNECTION_URI: ${DB_CONNECTION_URI}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_USE_AUTH: ${AUTH_USE_AUTH:-false}
      LLM_OPENAI_API_KEY: ${LLM_OPENAI_API_KEY}
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-pgvector}
      VECTOR_STORE_MIGRATED: ${VECTOR_STORE_MIGRATED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_URL: ${CACHE_URL:-redis://:${REDIS_PASSWORD}@honcho-redis:6379/0?suppress=true}
      DERIVER_ENABLED: ${DERIVER_ENABLED:-true}
      DERIVER_FLUSH_ENABLED: ${DERIVER_FLUSH_ENABLED:-false}
      SUMMARY_ENABLED: ${SUMMARY_ENABLED:-true}
      PEER_CARD_ENABLED: ${PEER_CARD_ENABLED:-true}
      DREAM_ENABLED: ${DREAM_ENABLED:-true}
    # ports:
    #   - "${HONCHO_BIND_IP:-127.0.0.1}:${HONCHO_PORT:-8000}:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.honcho-https.tls=true"
      - "traefik.http.routers.honcho-https.tls.certresolver=route53"
      - "traefik.http.routers.honcho-https.rule=Host(`${FQDN_HONCHO}`)"
      - "traefik.http.routers.honcho-https.entrypoints=websecure"
      - "traefik.http.routers.honcho-https.service=honcho-svc"
      - "traefik.http.services.honcho-svc.loadbalancer.server.port=8000"
    depends_on:
      honcho-redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - honcho
      - frontend

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.7
    container_name: honcho-deriver
    restart: unless-stopped
    command: ["/app/.venv/bin/python", "-m", "src.deriver"]
    environment:
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_URL: ${CACHE_URL:-redis://:${REDIS_PASSWORD}@honcho-redis:6379/0?suppress=true}
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-pgvector}
      VECTOR_STORE_MIGRATED: ${VECTOR_STORE_MIGRATED:-false}
      DB_CONNECTION_URI: ${DB_CONNECTION_URI}
      LLM_OPENAI_API_KEY: ${LLM_OPENAI_API_KEY}
      DERIVER_FLUSH_ENABLED: ${DERIVER_FLUSH_ENABLED:-false}
    depends_on:
      honcho-api:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    networks:
      - honcho

  honcho-redis:
    image: redis:8.2-alpine
    container_name: honcho-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - honcho

volumes:
  honcho-redis-data:

networks:
  honcho:
    name: honcho
    driver: bridge
  frontend:
    external: true

